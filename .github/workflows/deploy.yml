name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Injection de la clé OpenWeatherMap depuis les GitHub Secrets
      # → Settings → Secrets and variables → Actions → New repository secret
      #   OWM_API_KEY : clé gratuite https://openweathermap.org/api
      - name: Injecter la clé OpenWeatherMap
        run: |
          OWM="${{ secrets.OWM_API_KEY }}"
          echo "// tokens.js — généré par GitHub Actions le $(date -u +%Y-%m-%dT%H:%M:%SZ)" > docs/js/tokens.js
          if [ -n "$OWM" ]; then
            echo "CONFIG.OWM.apiKey = '${OWM}';" >> docs/js/tokens.js
            echo "✅ OWM_API_KEY injectée"
          else
            echo "⚠️  OWM_API_KEY non défini — overlays météo désactivés"
          fi
          git add -f docs/js/tokens.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
