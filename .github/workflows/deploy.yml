name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Injection des tokens Météo-France depuis les GitHub Secrets
      # → Réglage : Settings → Secrets and variables → Actions → New secret
      #   METEOFRANCE_TOKEN_AROMEPI : token API AROME-PI (nowcasting 0–6h)
      #   METEOFRANCE_TOKEN_PAAROME : token API PAAROME (analyse, conditions actuelles)
      - name: Injecter les tokens Météo-France
        run: |
          echo "// secrets.js — généré par GitHub Actions le $(date -u +%Y-%m-%dT%H:%M:%SZ)" > docs/js/secrets.js
          if [ -n "${{ secrets.METEOFRANCE_TOKEN_PAAROME }}" ]; then
            echo "CONFIG.METEO_FRANCE.tokenPaArome = '${{ secrets.METEOFRANCE_TOKEN_PAAROME }}';" >> docs/js/secrets.js
            echo "✅ Token PAAROME injecté" >&2
          else
            echo "⚠️ Secret METEOFRANCE_TOKEN_PAAROME absent ou vide" >&2
          fi
          if [ -n "${{ secrets.METEOFRANCE_TOKEN_AROMEPI }}" ]; then
            echo "CONFIG.METEO_FRANCE.tokenAromePi = '${{ secrets.METEOFRANCE_TOKEN_AROMEPI }}';" >> docs/js/secrets.js
            echo "✅ Token AROME-PI injecté" >&2
          else
            echo "⚠️ Secret METEOFRANCE_TOKEN_AROMEPI absent ou vide" >&2
          fi
          echo "📄 Contenu secrets.js généré ($(wc -l < docs/js/secrets.js) lignes)" >&2

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
