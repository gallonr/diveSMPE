name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Injection des tokens Météo-France depuis les GitHub Secrets
      # → Settings → Secrets and variables → Actions → New repository secret
      #   METEOFRANCE_TOKEN_PAAROME : token API PAAROME (analyse, conditions actuelles)
      #   METEOFRANCE_TOKEN_AROMEPI : token API AROME-PI (nowcasting 0–6h, pas 15 min)
      # docs/ est copié dans /tmp/pages/ (hors dépôt git) avant injection,
      # car upload-pages-artifact n'embarque que les fichiers du git index.
      - name: Préparer et injecter les tokens Météo-France
        run: |
          mkdir /tmp/pages && cp -r docs/. /tmp/pages/
          PA="${{ secrets.METEOFRANCE_TOKEN_PAAROME }}"
          PI="${{ secrets.METEOFRANCE_TOKEN_AROMEPI }}"
          LEGACY="${{ secrets.METEOFRANCE_TOKEN }}"
          PA="${PA:-$LEGACY}"
          PI="${PI:-$LEGACY}"
          echo "// tokens.js — généré par GitHub Actions le $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/pages/js/tokens.js
          if [ -n "$PA" ]; then
            echo "CONFIG.METEO_FRANCE.tokenPaArome = '${PA}';" >> /tmp/pages/js/tokens.js
          fi
          if [ -n "$PI" ]; then
            echo "CONFIG.METEO_FRANCE.tokenAromePi = '${PI}';" >> /tmp/pages/js/tokens.js
          fi
          echo "tokens.js — $(wc -l < /tmp/pages/js/tokens.js) ligne(s)"
          head -1 /tmp/pages/js/tokens.js
          echo "✅ tokenPaArome injecté: $(if [ -n "$PA" ]; then echo oui; else echo non; fi)"
          echo "✅ tokenAromePi injecté: $(if [ -n "$PI" ]; then echo oui; else echo non; fi)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
