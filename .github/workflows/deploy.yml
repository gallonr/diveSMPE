name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Injection des tokens Météo-France depuis les GitHub Secrets
      # → Settings → Secrets and variables → Actions → New repository secret
      #   METEOFRANCE_TOKEN_PAAROME : token API PAAROME (analyse, conditions actuelles)
      #   METEOFRANCE_TOKEN_AROMEPI : token API AROME-PI (nowcasting 0–6h, pas 15 min)
      # Les valeurs sont masquées dans les logs Actions mais écrites dans docs/js/secrets.js
      # (fichier public GitHub Pages) — acceptable pour usage associatif (visible DevTools de toute façon).
      - name: Injecter les tokens Météo-France
        run: |
          PA="${{ secrets.METEOFRANCE_TOKEN_PAAROME }}"
          PI="${{ secrets.METEOFRANCE_TOKEN_AROMEPI }}"
          LEGACY="${{ secrets.METEOFRANCE_TOKEN }}"
          # Fallback sur le token legacy si les tokens spécifiques ne sont pas définis
          [ -z "$PA" ] && PA="$LEGACY"
          [ -z "$PI" ] && PI="$LEGACY"
          {
            echo "// secrets.js — généré par GitHub Actions le $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            [ -n "$PA" ] && echo "CONFIG.METEO_FRANCE.tokenPaArome = '${PA}';"
            [ -n "$PI" ] && echo "CONFIG.METEO_FRANCE.tokenAromePi = '${PI}';"
          } > docs/js/secrets.js
          echo "✅ tokenPaArome injecté: $([ -n "$PA" ] && echo oui || echo non)"
          echo "✅ tokenAromePi injecté: $([ -n "$PI" ] && echo oui || echo non)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
