name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Injection des tokens Météo-France depuis les GitHub Secrets
      # → Réglage : Settings → Secrets and variables → Actions → New secret
      #   METEOFRANCE_TOKEN_AROMEPI : token API AROME-PI (nowcasting 0–6h)
      #   METEOFRANCE_TOKEN_PAAROME : token API PAAROME (analyse, conditions actuelles)
      - name: Injecter indicateurs de tokens (ne pas exposer les secrets)
        run: |
          echo "// secrets.js — généré par GitHub Actions le $(date -u +%Y-%m-%dT%H:%M:%SZ)" > docs/js/secrets.js
          # Ne PAS écrire les valeurs des tokens dans un fichier public.
          # Écrire uniquement des drapeaux/presence ou des placeholders masqués.
          TOKEN_LEGACY="${{ secrets.METEOFRANCE_TOKEN }}"
          TOKEN_PAAROME="${{ secrets.METEOFRANCE_TOKEN_PAAROME }}"
          TOKEN_AROMEPI="${{ secrets.METEOFRANCE_TOKEN_AROMEPI }}"
          TOK_PA_PRESENT=no
          TOK_PI_PRESENT=no
          if [ -n "${TOKEN_PAAROME:-}" ] || [ -n "${TOKEN_LEGACY:-}" ]; then
            TOK_PA_PRESENT=yes
            echo "// token PAAROME present: true (value NOT written to public file)" >> docs/js/secrets.js
            echo "CONFIG.METEO_FRANCE.haveTokenPaArome = true;" >> docs/js/secrets.js
          else
            echo "CONFIG.METEO_FRANCE.haveTokenPaArome = false;" >> docs/js/secrets.js
          fi
          if [ -n "${TOKEN_AROMEPI:-}" ] || [ -n "${TOKEN_LEGACY:-}" ]; then
            TOK_PI_PRESENT=yes
            echo "// token AROME-PI present: true (value NOT written to public file)" >> docs/js/secrets.js
            echo "CONFIG.METEO_FRANCE.haveTokenAromePi = true;" >> docs/js/secrets.js
          else
            echo "CONFIG.METEO_FRANCE.haveTokenAromePi = false;" >> docs/js/secrets.js
          fi
          # For debug in Actions logs only (do not print token values). Show masked presence only.
          echo "✅ Token PAAROME present: ${TOK_PA_PRESENT}" >&2
          echo "✅ Token AROME-PI present: ${TOK_PI_PRESENT}" >&2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
