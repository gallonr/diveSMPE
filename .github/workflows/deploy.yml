name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Injection des tokens Météo-France depuis les GitHub Secrets
      # → Réglage : Settings → Secrets and variables → Actions → New secret
      #   METEOFRANCE_TOKEN_AROMEPI : token API AROME-PI (nowcasting 0–6h)
      #   METEOFRANCE_TOKEN_PAAROME : token API PAAROME (analyse, conditions actuelles)
      - name: Injecter les tokens Météo-France
        run: |
          echo "// secrets.js — généré par GitHub Actions le $(date -u +%Y-%m-%dT%H:%M:%SZ)" > docs/js/secrets.js
          # Support ancien secret METEOFRANCE_TOKEN (token unique couvrant AROME + AROME-PI)
          TOKEN_LEGACY="${{ secrets.METEOFRANCE_TOKEN }}"
          TOKEN_PAAROME="${{ secrets.METEOFRANCE_TOKEN_PAAROME }}"
          TOKEN_AROMEPI="${{ secrets.METEOFRANCE_TOKEN_AROMEPI }}"
          # Utiliser les tokens spécifiques, ou le token legacy en fallback
          TOK_PA="${TOKEN_PAAROME:-$TOKEN_LEGACY}"
          TOK_PI="${TOKEN_AROMEPI:-$TOKEN_LEGACY}"
          if [ -n "$TOK_PA" ]; then
            echo "CONFIG.METEO_FRANCE.tokenPaArome = '${TOK_PA}';" >> docs/js/secrets.js
            echo "✅ Token PAAROME injecté" >&2
          else
            echo "⚠️ Aucun token PAAROME disponible (METEOFRANCE_TOKEN_PAAROME et METEOFRANCE_TOKEN absents)" >&2
          fi
          if [ -n "$TOK_PI" ]; then
            echo "CONFIG.METEO_FRANCE.tokenAromePi = '${TOK_PI}';" >> docs/js/secrets.js
            echo "✅ Token AROME-PI injecté" >&2
          else
            echo "⚠️ Aucun token AROME-PI disponible (METEOFRANCE_TOKEN_AROMEPI et METEOFRANCE_TOKEN absents)" >&2
          fi
          echo "📄 secrets.js final :" >&2
          cat docs/js/secrets.js | sed 's/eyJ[^'\''"]*/[TOKEN_MASQUÉ]/g' >&2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
